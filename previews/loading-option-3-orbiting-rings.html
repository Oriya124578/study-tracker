<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Option 3: Orbiting Rings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #f8f8f8 0%, #e8f5e9 100%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    .spacer { flex: 1; }

    .main-content {
      text-align: center;
      z-index: 10;
    }

    .logo-container {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 0 auto 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .orbit {
      position: absolute;
      border: 2px solid transparent;
      border-right-color: #059669;
      border-top-color: rgba(5, 150, 105, 0.4);
      border-radius: 50%;
      animation: rotate linear infinite;
    }

    .orbit:nth-child(1) {
      width: 180px;
      height: 180px;
      animation-duration: 4s;
    }

    .orbit:nth-child(2) {
      width: 130px;
      height: 130px;
      animation-duration: 3s;
      animation-direction: reverse;
      border-right-color: #10B981;
      border-top-color: rgba(16, 185, 129, 0.4);
    }

    .orbit:nth-child(3) {
      width: 80px;
      height: 80px;
      animation-duration: 2s;
      border-right-color: #D1FAE5;
      border-top-color: rgba(209, 250, 229, 0.4);
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .logo {
      width: 90px;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 15px 35px rgba(5, 150, 105, 0.3));
      animation: pulse 2s ease-in-out infinite;
    }
    .logo img { width: 100%; height: 100%; object-fit: contain; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .quote {
      font-size: 16px;
      color: #1D1D1F;
      margin-top: 20px;
      font-weight: 500;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeInOut 4s ease-in-out infinite;
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0; }
      10%, 90% { opacity: 1; }
    }

    .footer {
      text-align: center;
      margin-bottom: 40px;
      font-size: 12px;
      color: #6B7280;
      z-index: 10;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #E5E7EB;
      border-top-color: #059669;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="spacer"></div>

  <div class="main-content">
    <div class="logo-container">
      <div class="orbit"></div>
      <div class="orbit"></div>
      <div class="orbit"></div>
      <div class="logo"><img src="../public/logo.svg" alt="Calori Life"></div>
    </div>
    <div class="quote" id="quote">מחשבים לך את הדרך להצלחה...</div>
  </div>

  <div class="footer">
    <span class="spinner"></span>
    <span>Calori Life</span>
  </div>

  <div class="spacer"></div>

  <script>
    const quotes = [
      "מחשבים לך את הדרך להצלחה...",
      "הבריאות שלך היא ההשקעה הטובה ביותר",
      "כל יום הוא הזדמנות חדשה לשינוי",
      "אנחנו בונים עבורך תוכנית אישית",
      "איכות היא לא מעשה, היא הרגל",
      "הצעד הראשון הוא הכי חשוב"
    ];

    let currentQuote = 0;
    const quoteEl = document.getElementById('quote');

    setInterval(() => {
      currentQuote = (currentQuote + 1) % quotes.length;
      quoteEl.textContent = quotes[currentQuote];
    }, 4000);
  </script>
</body>
</html>
