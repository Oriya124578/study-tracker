<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Option 1: Particle System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #f8f8f8 0%, #e8f5e9 100%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    .spacer { flex: 1; }

    .main-content {
      text-align: center;
      z-index: 10;
    }

    .logo-container {
      position: relative;
      width: 140px;
      height: 140px;
      margin: 0 auto 40px;
    }

    .logo {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 20px 40px rgba(5, 150, 105, 0.25));
    }
    .logo img { width: 100%; height: 100%; object-fit: contain; }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }

    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: radial-gradient(circle, #059669, #10B981);
      border-radius: 50%;
      opacity: 0.6;
      box-shadow: 0 0 10px rgba(5, 150, 105, 0.4);
    }

    .quote {
      font-size: 16px;
      color: #1D1D1F;
      margin-top: 20px;
      font-weight: 500;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeInOut 4s ease-in-out infinite;
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0; }
      10%, 90% { opacity: 1; }
    }

    .footer {
      text-align: center;
      margin-bottom: 40px;
      font-size: 12px;
      color: #6B7280;
      z-index: 10;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #E5E7EB;
      border-top-color: #059669;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="spacer"></div>

  <div class="main-content">
    <div class="logo-container">
      <div class="logo"><img src="../public/logo.svg" alt="Calori Life"></div>
      <div class="particles" id="particles"></div>
    </div>
    <div class="quote" id="quote">מחשבים לך את הדרך להצלחה...</div>
  </div>

  <div class="footer">
    <span class="spinner"></span>
    <span>Calori Life</span>
  </div>

  <div class="spacer"></div>

  <script>
    const quotes = [
      "מחשבים לך את הדרך להצלחה...",
      "הבריאות שלך היא ההשקעה הטובה ביותר",
      "כל יום הוא הזדמנות חדשה לשינוי",
      "אנחנו בונים עבורך תוכנית אישית",
      "איכות היא לא מעשה, היא הרגל",
      "הצעד הראשון הוא הכי חשוב"
    ];

    let currentQuote = 0;
    const quoteEl = document.getElementById('quote');
    const particlesContainer = document.getElementById('particles');

    // Rotate quotes every 4 seconds
    setInterval(() => {
      currentQuote = (currentQuote + 1) % quotes.length;
      quoteEl.textContent = quotes[currentQuote];
    }, 4000);

    // Create particles
    function createParticles() {
      for (let i = 0; i < 15; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';

        const startX = Math.random() * 100;
        const startY = Math.random() * 100;
        const angle = (Math.random() * 360);
        const distance = 60 + Math.random() * 40;
        const duration = 3 + Math.random() * 2;
        const delay = Math.random() * 2;

        particle.style.left = startX + '%';
        particle.style.top = startY + '%';
        particle.style.animation = `moveParticle ${duration}s ease-out ${delay}s infinite`;

        particlesContainer.appendChild(particle);

        // Create keyframes for this particle
        const keyframes = `
          @keyframes moveParticle {
            0% {
              opacity: 0.8;
              transform: translate(0, 0) scale(1);
            }
            100% {
              opacity: 0;
              transform: translate(${Math.cos(angle * Math.PI / 180) * distance}px, ${Math.sin(angle * Math.PI / 180) * distance}px) scale(0);
            }
          }
        `;

        const style = document.createElement('style');
        style.textContent = keyframes;
        document.head.appendChild(style);
      }
    }

    createParticles();
  </script>
</body>
</html>
