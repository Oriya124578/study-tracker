<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Option 2: Morphing Gradient</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      background: #ffffff;
    }

    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(-45deg, #059669, #10B981, #D1FAE5, #059669);
      background-size: 400% 400%;
      animation: morphGradient 15s ease infinite;
      z-index: 0;
    }

    @keyframes morphGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .spacer { flex: 1; z-index: 10; }

    .main-content {
      text-align: center;
      z-index: 10;
      position: relative;
    }

    .logo-container {
      position: relative;
      width: 140px;
      height: 140px;
      margin: 0 auto 40px;
    }

    .glow-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 140px;
      height: 140px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      animation: pulseRing 2s ease-in-out infinite;
    }

    .glow-ring:nth-child(2) {
      width: 160px;
      height: 160px;
      animation-delay: 0.3s;
      border-color: rgba(255, 255, 255, 0.2);
    }

    .glow-ring:nth-child(3) {
      width: 180px;
      height: 180px;
      animation-delay: 0.6s;
      border-color: rgba(255, 255, 255, 0.1);
    }

    @keyframes pulseRing {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.7; }
    }

    .logo {
      position: relative;
      width: 140px;
      height: 140px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(10px);
      animation: float 3s ease-in-out infinite;
    }
    .logo img { width: 100%; height: 100%; object-fit: contain; }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
    }

    .quote {
      font-size: 16px;
      color: #ffffff;
      margin-top: 20px;
      font-weight: 500;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      animation: fadeInOut 4s ease-in-out infinite;
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0; }
      10%, 90% { opacity: 1; }
    }

    .footer {
      text-align: center;
      margin-bottom: 40px;
      font-size: 12px;
      color: #ffffff;
      z-index: 10;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      position: relative;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.4);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="background"></div>

  <div class="spacer"></div>

  <div class="main-content">
    <div class="logo-container">
      <div class="glow-ring"></div>
      <div class="glow-ring"></div>
      <div class="glow-ring"></div>
      <div class="logo"><img src="../public/logo.svg" alt="Calori Life"></div>
    </div>
    <div class="quote" id="quote">מחשבים לך את הדרך להצלחה...</div>
  </div>

  <div class="footer">
    <span class="spinner"></span>
    <span>Calori Life</span>
  </div>

  <div class="spacer"></div>

  <script>
    const quotes = [
      "מחשבים לך את הדרך להצלחה...",
      "הבריאות שלך היא ההשקעה הטובה ביותר",
      "כל יום הוא הזדמנות חדשה לשינוי",
      "אנחנו בונים עבורך תוכנית אישית",
      "איכות היא לא מעשה, היא הרגל",
      "הצעד הראשון הוא הכי חשוב"
    ];

    let currentQuote = 0;
    const quoteEl = document.getElementById('quote');

    setInterval(() => {
      currentQuote = (currentQuote + 1) % quotes.length;
      quoteEl.textContent = quotes[currentQuote];
    }, 4000);
  </script>
</body>
</html>
