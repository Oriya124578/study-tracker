<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Option 5: Minimal Progress</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    .spacer { flex: 1; }

    .main-content {
      text-align: center;
      max-width: 320px;
      padding: 0 24px;
    }

    .logo-container {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 32px;
    }

    .logo-svg {
      width: 100%;
      height: 100%;
    }

    .logo-bg {
      stroke: #E5E7EB;
      stroke-width: 6;
      fill: none;
    }

    .logo-progress {
      stroke: #059669;
      stroke-width: 6;
      stroke-linecap: round;
      fill: none;
      stroke-dasharray: 283;
      stroke-dashoffset: 283;
      animation: progress 3s ease-in-out infinite;
      transform: rotate(-90deg);
      transform-origin: center;
    }

    @keyframes progress {
      0% { stroke-dashoffset: 283; }
      50% { stroke-dashoffset: 70; }
      100% { stroke-dashoffset: 283; }
    }

    .logo-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 56px;
      height: 56px;
      animation: heartbeat 2s ease-in-out infinite;
    }
    .logo-icon img { width: 100%; height: 100%; object-fit: contain; }

    @keyframes heartbeat {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.1); }
    }

    .brand {
      font-size: 24px;
      font-weight: 700;
      color: #1D1D1F;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .brand-sub {
      font-size: 13px;
      color: #6B7280;
      margin-bottom: 32px;
      font-weight: 500;
    }

    .quote {
      font-size: 15px;
      color: #1D1D1F;
      font-weight: 500;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.5;
      animation: fadeInOut 4s ease-in-out infinite;
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0; }
      10%, 90% { opacity: 1; }
    }

    .footer {
      margin-bottom: 40px;
      text-align: center;
    }

    .progress-bar {
      width: 200px;
      height: 3px;
      background: #E5E7EB;
      border-radius: 3px;
      overflow: hidden;
      margin: 0 auto;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #059669, #10B981);
      border-radius: 3px;
      animation: fillProgress 2s ease-in-out infinite;
    }

    @keyframes fillProgress {
      0% { width: 0%; margin-left: 0%; }
      50% { width: 80%; margin-left: 10%; }
      100% { width: 0%; margin-left: 100%; }
    }
  </style>
</head>
<body>
  <div class="spacer"></div>

  <div class="main-content">
    <div class="logo-container">
      <svg class="logo-svg" viewBox="0 0 100 100">
        <circle class="logo-bg" cx="50" cy="50" r="45"></circle>
        <circle class="logo-progress" cx="50" cy="50" r="45"></circle>
      </svg>
      <div class="logo-icon"><img src="../public/logo.svg" alt="Calori Life"></div>
    </div>

    <div class="brand">Calori Life</div>
    <div class="brand-sub">המנהל האישי שלך</div>

    <div class="quote" id="quote">מחשבים לך את הדרך להצלחה...</div>
  </div>

  <div class="footer">
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>

  <div class="spacer"></div>

  <script>
    const quotes = [
      "מחשבים לך את הדרך להצלחה...",
      "הבריאות שלך היא ההשקעה הטובה ביותר",
      "כל יום הוא הזדמנות חדשה לשינוי",
      "אנחנו בונים עבורך תוכנית אישית",
      "איכות היא לא מעשה, היא הרגל",
      "הצעד הראשון הוא הכי חשוב"
    ];

    let currentQuote = 0;
    const quoteEl = document.getElementById('quote');

    setInterval(() => {
      currentQuote = (currentQuote + 1) % quotes.length;
      quoteEl.textContent = quotes[currentQuote];
    }, 4000);
  </script>
</body>
</html>
