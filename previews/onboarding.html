<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Calori Life — הצטרפות</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{
    --bg:#F5F5F7;--bg-deep:#ECECEF;--surface:#FFFFFF;--surface-2:#FAFAFB;
    --hairline:#E5E5EA;--hairline-strong:#D2D2D7;
    --ink:#1D1D1F;--ink-2:#4A4A4F;--ink-3:#8E8E93;--ink-4:#C7C7CC;
    --primary:#059669;--primary-2:#10B981;--primary-soft:#D1FAE5;--primary-tint:rgba(5,150,105,0.06);--primary-fg:#FFFFFF;
    --nutrition:#059669;--nutrition-2:#10B981;--nutrition-soft:#D1FAE5;--nutrition-tint:rgba(5,150,105,0.06);
    --fitness:#7C3AED;--fitness-2:#8B5CF6;--fitness-soft:#EDE9FE;--fitness-tint:rgba(124,58,237,0.06);
    --danger:#DC2626;--warn:#D97706;--info:#2563EB;--warn-soft:#FEF3C7;
  }
  body{font-family:'Heebo','Rubik',sans-serif;background:var(--bg-deep);color:var(--ink);}
  .phone{max-width:430px;margin:0 auto;background:var(--surface);min-height:100vh;}
  @media(min-width:500px){.phone{margin:24px auto;border-radius:2.25rem;min-height:calc(100vh - 48px);box-shadow:0 25px 50px -12px rgba(0,0,0,.25);overflow:hidden;border:8px solid #111;}}
  .preview-note{position:fixed;bottom:8px;left:8px;font-size:10px;color:#9ca3af;z-index:50;}
  .chip{transition:all .15s;}
  .chip.active{background:var(--primary);border-color:var(--primary);color:#fff;}
</style>
</head>
<body>
<div class="phone flex flex-col px-6 py-10 relative">
  <a href="index.html" class="absolute top-4 right-4 text-xs text-gray-400 hover:text-gray-700">← חזרה</a>

  <div class="flex items-center gap-1 mb-6 mt-2">
    <div class="flex-1 h-1 rounded-full" style="background:var(--primary)"></div>
    <div class="flex-1 h-1 rounded-full" style="background:var(--primary)"></div>
    <div class="flex-1 h-1 rounded-full bg-gray-200"></div>
  </div>

  <h1 class="text-2xl font-extrabold leading-tight">ברוך הבא ל-Calori Life</h1>
  <p class="text-gray-500 text-sm mt-2 leading-relaxed">המנהל האישי שמחבר את הלימודים, החיים והבריאות</p>

  <div class="flex justify-center my-6">
    <div class="relative">
      <div class="w-24 h-24 rounded-full bg-gradient-to-br from-emerald-200 to-emerald-400 flex items-center justify-center text-3xl font-extrabold" style="color:#fff">א</div>
      <button class="absolute bottom-0 left-0 w-8 h-8 rounded-full bg-white border-2 border-emerald-100 flex items-center justify-center shadow">
        <i data-lucide="camera" class="w-4 h-4 text-gray-600"></i>
      </button>
    </div>
  </div>

  <div class="space-y-3">
    <div>
      <label class="block text-xs font-bold mb-2 text-gray-600">שם תצוגה</label>
      <input type="text" value="אוריה" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 px-3 text-sm focus:outline-none focus:border-emerald-400">
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-xs font-bold mb-2 text-gray-600">שנת לימודים</label>
        <div class="relative">
          <select class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 px-3 text-sm appearance-none">
            <option>שנה א'</option><option>שנה ב'</option><option>שנה ג'</option>
          </select>
          <i data-lucide="chevron-down" class="w-4 h-4 absolute left-2 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
        </div>
      </div>
      <div>
        <label class="block text-xs font-bold mb-2 text-gray-600">סמסטר</label>
        <div class="relative">
          <select class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 px-3 text-sm appearance-none">
            <option>סמסטר א'</option><option>סמסטר ב'</option>
          </select>
          <i data-lucide="chevron-down" class="w-4 h-4 absolute left-2 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
        </div>
      </div>
    </div>
  </div>

  <div class="mt-6">
    <div class="font-bold text-sm mb-3">בחר את הקורסים שלך</div>
    <div class="grid grid-cols-2 gap-2">
      <button class="chip active border-2 rounded-xl py-2.5 text-sm font-bold flex items-center justify-center gap-1">
        <i data-lucide="check" class="w-4 h-4"></i> אינפי 2
      </button>
      <button class="chip active border-2 rounded-xl py-2.5 text-sm font-bold flex items-center justify-center gap-1">
        <i data-lucide="check" class="w-4 h-4"></i> אלגברה לינארית 2
      </button>
      <button class="chip active border-2 rounded-xl py-2.5 text-sm font-bold flex items-center justify-center gap-1">
        <i data-lucide="check" class="w-4 h-4"></i> תכנות בשפת C
      </button>
      <button class="chip border-2 border-gray-200 bg-white rounded-xl py-2.5 text-sm font-bold text-gray-500">מבני נתונים</button>
      <button class="chip border-2 border-gray-200 bg-white rounded-xl py-2.5 text-sm font-bold text-gray-500 col-span-2">לוגיקה ותורת הקבוצות</button>
    </div>
  </div>

  <button class="w-full font-bold py-3.5 rounded-xl shadow-sm mt-auto mt-8" style="background:var(--primary);color:var(--primary-fg)">התחל</button>
</div>
<div class="preview-note">תצוגה מקדימה • לא פעיל</div>
<script>lucide.createIcons();</script>
</body>
</html>
