<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Option 4: Liquid Blob</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      position: relative;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.6;
      animation: floatBlob 20s ease-in-out infinite;
    }

    .blob-1 {
      width: 400px;
      height: 400px;
      background: #10B981;
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    .blob-2 {
      width: 350px;
      height: 350px;
      background: #059669;
      bottom: -100px;
      right: -100px;
      animation-delay: -7s;
    }

    .blob-3 {
      width: 300px;
      height: 300px;
      background: #D1FAE5;
      top: 40%;
      left: 50%;
      animation-delay: -14s;
    }

    @keyframes floatBlob {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(100px, -50px) scale(1.1); }
      66% { transform: translate(-50px, 100px) scale(0.9); }
    }

    .spacer { flex: 1; z-index: 10; }

    .main-content { text-align: center; z-index: 10; position: relative; }

    .logo-container {
      position: relative;
      width: 160px;
      height: 160px;
      margin: 0 auto 40px;
    }

    .logo {
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 26px;
      box-shadow: 0 25px 50px rgba(5, 150, 105, 0.15);
      animation: floatLogo 4s ease-in-out infinite;
    }
    .logo img { width: 100%; height: 100%; object-fit: contain; }

    @keyframes floatLogo {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(3deg); }
    }

    .quote {
      font-size: 17px;
      color: #1D1D1F;
      margin-top: 20px;
      font-weight: 600;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeInOut 4s ease-in-out infinite;
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0; }
      10%, 90% { opacity: 1; }
    }

    .footer {
      text-align: center;
      margin-bottom: 40px;
      font-size: 12px;
      color: #1D1D1F;
      z-index: 10;
      position: relative;
      font-weight: 500;
    }

    .progress-dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #059669;
      border-radius: 50%;
      animation: dotPulse 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="spacer"></div>

  <div class="main-content">
    <div class="logo-container">
      <div class="logo"><img src="../public/logo.svg" alt="Calori Life"></div>
    </div>
    <div class="quote" id="quote">מחשבים לך את הדרך להצלחה...</div>
  </div>

  <div class="footer">
    <div>Calori Life</div>
    <div class="progress-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <div class="spacer"></div>

  <script>
    const quotes = [
      "מחשבים לך את הדרך להצלחה...",
      "הבריאות שלך היא ההשקעה הטובה ביותר",
      "כל יום הוא הזדמנות חדשה לשינוי",
      "אנחנו בונים עבורך תוכנית אישית",
      "איכות היא לא מעשה, היא הרגל",
      "הצעד הראשון הוא הכי חשוב"
    ];

    let currentQuote = 0;
    const quoteEl = document.getElementById('quote');

    setInterval(() => {
      currentQuote = (currentQuote + 1) % quotes.length;
      quoteEl.textContent = quotes[currentQuote];
    }, 4000);
  </script>
</body>
</html>
