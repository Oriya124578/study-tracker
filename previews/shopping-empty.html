<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Shopping List — Empty State</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Rubik:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Instrument+Serif:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  :root {
    --bg: #FAF7F2;
    --ink: #2A1A0A;
    --muted: #8A7A6A;
    --sub: #5A4A3A;
    --border: rgba(180,140,80,.12);
    --border-mid: rgba(180,140,80,.14);
    --green: #059669;
    --green-soft: #D1FAE5;
    --card-shadow: 0 2px 10px rgba(40,20,0,.05);
    --card-radius: 14px;
    --sans: 'Inter','Rubik','Heebo',system-ui,sans-serif;
    --serif: 'Instrument Serif',serif;
    --display: 'Fraunces',serif;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    max-width: 430px;
    margin: 0 auto;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── Header ─────────────────────── */
  .header {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    background: rgba(250,247,242,.94);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border-bottom: 1px solid var(--border);
  }
  .header-left { display:flex; align-items:center; gap:12px; }
  .avatar {
    width:34px; height:34px; border-radius:50%;
    background: linear-gradient(135deg, #10B981, #059669);
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:700; font-size:14px;
  }
  .header-title {
    font-family: var(--serif); font-size:17px; font-weight:400;
    color: var(--ink); letter-spacing: -.01em;
  }
  .wordmark {
    font-size:19px; font-weight:800; color:var(--ink); letter-spacing:-.02em;
    line-height:1;
  }
  .wordmark span {
    font-family: var(--serif); font-weight:400; color:var(--green);
    font-size:21px; font-style:normal;
  }

  /* ── Content ────────────────────── */
  .content {
    flex:1; padding:20px 16px 120px;
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:24px;
  }

  /* Illustration */
  .empty-illustration {
    width:160px; height:160px; border-radius:50%;
    background: linear-gradient(145deg, var(--green-soft), rgba(5,150,105,.08));
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .cart-icon {
    font-size:64px; filter:grayscale(0.1);
  }
  .sparkle {
    position:absolute; font-size:18px;
    animation: sparkle 2s ease-in-out infinite;
  }
  .sparkle:nth-child(2) { top:12px; right:20px; animation-delay:0s; }
  .sparkle:nth-child(3) { bottom:20px; left:14px; animation-delay:.7s; }
  .sparkle:nth-child(4) { top:30px; left:10px; animation-delay:1.3s; }
  @keyframes sparkle {
    0%,100% { opacity:.3; transform:scale(.8); }
    50% { opacity:1; transform:scale(1.2); }
  }

  .empty-title {
    font-family: var(--serif); font-size:24px; font-weight:400;
    color:var(--ink); text-align:center;
  }
  .empty-sub {
    font-size:14px; color:var(--muted); text-align:center;
    max-width:280px; line-height:1.6;
  }

  /* Buttons */
  .btn-primary {
    display:flex; align-items:center; gap:10px;
    padding:14px 28px; border-radius:14px;
    background:var(--green); color:#fff;
    font-size:15px; font-weight:600;
    border:none; cursor:pointer;
    box-shadow: 0 4px 16px rgba(5,150,105,.25);
    transition: transform .15s, box-shadow .15s;
  }
  .btn-primary:active { transform:scale(.97); }
  .btn-primary svg { width:20px; height:20px; }

  .btn-secondary {
    display:flex; align-items:center; gap:8px;
    padding:12px 24px; border-radius:12px;
    background:transparent; color:var(--sub);
    font-size:14px; font-weight:500;
    border:1px solid var(--border-mid); cursor:pointer;
    transition: background .15s;
  }
  .btn-secondary:active { background:rgba(180,140,80,.06); }
  .btn-secondary svg { width:18px; height:18px; }

  /* ── Bottom Nav ─────────────────── */
  .bottom-nav {
    position: fixed; bottom: 0; left:50%; transform:translateX(-50%);
    width: 100%; max-width: 430px; z-index: 50;
    display: flex; justify-content: space-around; align-items: center;
    padding: 12px 8px calc(16px + env(safe-area-inset-bottom));
    background: rgba(250,247,242,.96);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    min-height: 72px;
  }
  .nav-item {
    display:flex; flex-direction:column; align-items:center; gap:2px;
    padding:6px 4px; min-width:48px; border:none; background:none;
    cursor:pointer; border-radius:12px;
    transition: background .15s;
  }
  .nav-item:active { background:rgba(180,140,80,.08); }
  .nav-icon { width:20px; height:20px; }
  .nav-label { font-size:10px; font-weight:700; line-height:1; margin-top:3px; }
  .nav-item.active .nav-icon { opacity:1; }
  .nav-item:not(.active) .nav-icon { opacity:.25; }
  .nav-item.active .nav-label { color:var(--green); }
  .nav-item:not(.active) .nav-label { color:rgba(42,26,10,.3); }

  /* FAB */
  .fab {
    position:fixed; z-index:60;
    bottom: 80px; left:50%; transform:translateX(-50%);
    width:52px; height:52px; border-radius:16px;
    background:var(--green);
    color:#fff; border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 4px 20px rgba(5,150,105,.35);
    transition: transform .15s;
  }
  .fab:active { transform:translateX(-50%) scale(.92); }
  .fab svg { width:24px; height:24px; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="avatar">O</div>
    <div class="header-title">רשימת קניות</div>
  </div>
  <div class="wordmark">calori<span> life</span></div>
</div>

<!-- Empty State -->
<div class="content">
  <div class="empty-illustration">
    <div class="cart-icon">🛒</div>
    <div class="sparkle">✨</div>
    <div class="sparkle">✨</div>
    <div class="sparkle">✨</div>
  </div>

  <div class="empty-title">אין רשימה פעילה</div>
  <div class="empty-sub">
    הדבק רשימת קניות מווטסאפ או הוסף מוצרים ידנית — הכל יתחלק לקטגוריות אוטומטית
  </div>

  <button class="btn-primary">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="6" rx="1"/><path d="m16 13-3.5 3.5L9 13"/><path d="M5 18h14"/><path d="M12 2v12.5"/></svg>
    הדבק רשימה מווטסאפ
  </button>

  <button class="btn-secondary">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    הוסף ידנית
  </button>
</div>

<!-- FAB -->
<button class="fab">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- Bottom Nav — 5 tabs -->
<nav class="bottom-nav">
  <button class="nav-item">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span class="nav-label" style="color:rgba(42,26,10,.3)">מנהל</span>
  </button>
  <button class="nav-item active">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    <span class="nav-label">קניות</span>
  </button>
  <button class="nav-item">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span class="nav-label">בית</span>
  </button>
  <button class="nav-item">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span class="nav-label">לוח</span>
  </button>
  <button class="nav-item">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    <span class="nav-label">לימודים</span>
  </button>
</nav>

</body>
</html>
