<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Calori Life — התחברות</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{
    --bg:#F5F5F7;--bg-deep:#ECECEF;--surface:#FFFFFF;--surface-2:#FAFAFB;
    --hairline:#E5E5EA;--hairline-strong:#D2D2D7;
    --ink:#1D1D1F;--ink-2:#4A4A4F;--ink-3:#8E8E93;--ink-4:#C7C7CC;
    --primary:#059669;--primary-2:#10B981;--primary-soft:#D1FAE5;--primary-tint:rgba(5,150,105,0.06);--primary-fg:#FFFFFF;
    --nutrition:#059669;--nutrition-2:#10B981;--nutrition-soft:#D1FAE5;--nutrition-tint:rgba(5,150,105,0.06);
    --fitness:#7C3AED;--fitness-2:#8B5CF6;--fitness-soft:#EDE9FE;--fitness-tint:rgba(124,58,237,0.06);
    --danger:#DC2626;--warn:#D97706;--info:#2563EB;--warn-soft:#FEF3C7;
  }
  body{font-family:'Heebo','Rubik',sans-serif;background:var(--bg-deep);color:var(--ink);}
  .phone{max-width:430px;margin:0 auto;background:linear-gradient(180deg,var(--surface) 0%,var(--primary-tint) 100%);min-height:100vh;}
  @media(min-width:500px){
    .phone{margin:24px auto;border-radius:2.25rem;min-height:calc(100vh - 48px);box-shadow:0 25px 50px -12px rgba(0,0,0,.25);overflow:hidden;border:8px solid #111;}
  }
  .preview-note{position:fixed;bottom:8px;left:8px;font-size:10px;color:#9ca3af;z-index:50;}
</style>
</head>
<body>
<div class="phone flex flex-col px-6 py-12 relative">
  <a href="index.html" class="absolute top-4 right-4 text-xs text-gray-400 hover:text-gray-700">← חזרה</a>

  <div class="flex flex-col items-center mt-12 mb-10">
    <div class="w-20 h-20 rounded-3xl flex items-center justify-center mb-5 shadow-lg" style="background:var(--primary)">
      <i data-lucide="graduation-cap" class="w-12 h-12" style="color:var(--primary-fg);fill:var(--primary-fg)"></i>
    </div>
    <h1 class="text-3xl font-extrabold tracking-tight" style="background:linear-gradient(135deg,var(--primary),var(--primary-2));-webkit-background-clip:text;background-clip:text;color:transparent;">Calori Life</h1>
    <p class="text-gray-500 text-center mt-3 text-sm leading-relaxed px-4">התחבר כדי להמשיך לנהל את היום שלך</p>
  </div>

  <form class="space-y-3">
    <div>
      <label class="block text-xs font-bold mb-2 text-gray-600">אימייל</label>
      <div class="relative">
        <i data-lucide="mail" class="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input type="email" placeholder="you@example.com" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 pr-10 pl-3 text-sm focus:outline-none focus:border-emerald-400" value="oriya@calori.app">
      </div>
    </div>
    <div>
      <label class="block text-xs font-bold mb-2 text-gray-600">סיסמה</label>
      <div class="relative">
        <i data-lucide="lock" class="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input type="password" placeholder="••••••••" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 pr-10 pl-3 text-sm focus:outline-none focus:border-emerald-400" value="••••••••">
      </div>
    </div>
    <div class="text-left">
      <a href="#" class="text-xs text-gray-500 hover:text-gray-900">שכחת סיסמה?</a>
    </div>
    <button type="button" class="w-full font-bold py-3.5 rounded-xl shadow-sm hover:shadow-md transition" style="background:var(--primary);color:var(--primary-fg)">התחבר</button>
  </form>

  <div class="flex items-center gap-3 my-6">
    <div class="flex-1 h-px bg-gray-200"></div>
    <span class="text-xs text-gray-400">או</span>
    <div class="flex-1 h-px bg-gray-200"></div>
  </div>

  <button class="w-full bg-white border border-gray-200 rounded-xl py-3.5 font-bold text-sm flex items-center justify-center gap-3 hover:bg-gray-50">
    <svg class="w-5 h-5" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.4-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34.1 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2c-2 1.5-4.5 2.4-7.2 2.4-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2c-.4.4 6.6-4.8 6.6-14.8 0-1.3-.1-2.4-.4-3.5z"/></svg>
    התחבר עם Google
  </button>

  <div class="text-center text-sm text-gray-500 mt-auto mb-4 pt-12">
    אין לך חשבון? <a href="#" class="font-bold" style="color:#059669">הרשם עכשיו</a>
  </div>
</div>
<div class="preview-note">תצוגה מקדימה • לא פעיל</div>
<script>lucide.createIcons();</script>
</body>
</html>
