<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Study Tracker — תכנות בשפת C</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{
    --bg:#F5F5F7;--bg-deep:#ECECEF;--surface:#FFFFFF;--surface-2:#FAFAFB;
    --hairline:#E5E5EA;--hairline-strong:#D2D2D7;
    --ink:#1D1D1F;--ink-2:#4A4A4F;--ink-3:#8E8E93;--ink-4:#C7C7CC;
    --primary:#059669;--primary-2:#10B981;--primary-soft:#D1FAE5;--primary-tint:rgba(5,150,105,0.06);--primary-fg:#FFFFFF;
    --nutrition:#059669;--nutrition-2:#10B981;--nutrition-soft:#D1FAE5;--nutrition-tint:rgba(5,150,105,0.06);
    --fitness:#7C3AED;--fitness-2:#8B5CF6;--fitness-soft:#EDE9FE;--fitness-tint:rgba(124,58,237,0.06);
    --danger:#DC2626;--warn:#D97706;--info:#2563EB;--warn-soft:#FEF3C7;
    --text:var(--ink);--text-muted:var(--ink-3);--border:var(--hairline);
  }
  body{font-family:'Heebo','Rubik',sans-serif;background:var(--bg-deep);color:var(--ink);}
  .phone{max-width:430px;margin:0 auto;background:var(--bg);min-height:100vh;position:relative;padding-bottom:100px;}
  @media(min-width:500px){.phone{margin:24px auto;border-radius:2.25rem;min-height:calc(100vh - 48px);box-shadow:0 25px 50px -12px rgba(0,0,0,.25);overflow:hidden;border:8px solid #111;}}
  .preview-note{position:fixed;bottom:8px;left:8px;font-size:10px;color:#9ca3af;z-index:50;}
  .scroll-x{scrollbar-width:none;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .scroll-x::-webkit-scrollbar{display:none;}
  .progress-bar{background:linear-gradient(90deg,#059669,#34d399);border-radius:9999px;height:100%;transition:width .6s cubic-bezier(.4,0,.2,1);}
  .tab-active{color:var(--primary);border-bottom:2.5px solid var(--primary);font-weight:700;}
  .week-pill{transition:all .15s ease;}
  .task-row{transition:background .15s ease;}
  .task-row:active{background:#f9fafb;}
  .nav-fab{box-shadow:0 8px 20px rgba(5,150,105,.4);}
</style>
</head>
<body>
<div class="phone">

  <!-- Header -->
  <header class="bg-white px-5 pt-12 pb-3">
    <a href="index.html" class="text-xs text-gray-400 hover:text-gray-700 block mb-2">← חזרה לתצוגה</a>
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button class="w-9 h-9 rounded-xl bg-gray-50 flex items-center justify-center hover:bg-gray-100 transition">
          <i data-lucide="arrow-right" class="w-5 h-5 text-gray-600"></i>
        </button>
        <h1 class="text-xl font-extrabold tracking-tight">תכנות בשפת C</h1>
      </div>
      <button class="w-9 h-9 rounded-xl bg-gray-50 flex items-center justify-center hover:bg-gray-100 transition">
        <i data-lucide="settings" class="w-5 h-5 text-gray-500"></i>
      </button>
    </div>
  </header>

  <!-- Progress Bar -->
  <div class="bg-white px-5 pb-4">
    <div class="flex items-center justify-between mb-1.5">
      <span class="text-xs font-bold text-gray-500">התקדמות כללית</span>
      <span class="text-xs font-extrabold" style="color:var(--primary)">75%</span>
    </div>
    <div class="w-full h-2.5 rounded-full bg-gray-100 overflow-hidden">
      <div class="progress-bar" style="width:75%"></div>
    </div>
  </div>

  <!-- Quick Links -->
  <div class="bg-white px-5 pb-4">
    <div class="flex items-center gap-2">
      <a href="#" class="inline-flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-xs font-bold border transition hover:shadow-sm" style="background:#e8eaff;border-color:#c7cbff;color:#4338ca;">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        Gemini
      </a>
      <a href="#" class="inline-flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-xs font-bold border transition hover:shadow-sm" style="background:#fef3c7;border-color:#fde68a;color:#92400e;">
        <i data-lucide="notebook-pen" class="w-3.5 h-3.5"></i>
        NotebookLM
      </a>
    </div>
  </div>

  <!-- Tab Navigation -->
  <div class="bg-white border-b" style="border-color:var(--border)">
    <div class="scroll-x flex gap-0 px-2">
      <button class="flex-shrink-0 px-4 py-3 text-sm tab-active">שבועיות</button>
      <button class="flex-shrink-0 px-4 py-3 text-sm text-gray-400 font-medium hover:text-gray-600 transition border-b-2 border-transparent">הרצאות</button>
      <button class="flex-shrink-0 px-4 py-3 text-sm text-gray-400 font-medium hover:text-gray-600 transition border-b-2 border-transparent">תרגולים</button>
      <button class="flex-shrink-0 px-4 py-3 text-sm text-gray-400 font-medium hover:text-gray-600 transition border-b-2 border-transparent">מבחנים</button>
      <button class="flex-shrink-0 px-4 py-3 text-sm text-gray-400 font-medium hover:text-gray-600 transition border-b-2 border-transparent">סיכומים</button>
    </div>
  </div>

  <!-- Week Selector Pills -->
  <div class="px-4 pt-4 pb-2">
    <div class="scroll-x flex gap-2 pb-1">
      <!-- Weeks 1-7: completed (green checkmark dot) -->
      <button class="week-pill flex-shrink-0 relative px-3 py-1.5 rounded-full text-xs font-bold bg-white border text-gray-500" style="border-color:var(--border)">
        שבוע 1
        <span class="absolute -top-0.5 -left-0.5 w-3.5 h-3.5 rounded-full flex items-center justify-center" style="background:var(--primary)">
          <i data-lucide="check" class="w-2.5 h-2.5 text-white" stroke-width="3"></i>
        </span>
      </button>
      <button class="week-pill flex-shrink-0 relative px-3 py-1.5 rounded-full text-xs font-bold bg-white border text-gray-500" style="border-color:var(--border)">
        שבוע 2
        <span class="absolute -top-0.5 -left-0.5 w-3.5 h-3.5 rounded-full flex items-center justify-center" style="background:var(--primary)">
          <i data-lucide="check" class="w-2.5 h-2.5 text-white" stroke-width="3"></i>
        </span>
      </button>
      <button class="week-pill flex-shrink-0 relative px-3 py-1.5 rounded-full text-xs font-bold bg-white border text-gray-500" style="border-color:var(--border)">
        שבוע 3
        <span class="absolute -top-0.5 -left-0.5 w-3.5 h-3.5 rounded-full flex items-center justify-center" style="background:var(--primary)">
          <i data-lucide="check" class="w-2.5 h-2.5 text-white" stroke-width="3"></i>
        </span>
      </button>
      <button class="week-pill flex-shrink-0 relative px-3 py-1.5 rounded-full text-xs font-bold bg-white border text-gray-500" style="border-color:var(--border)">
        שבוע 4
        <span class="absolute -top-0.5 -left-0.5 w-3.5 h-3.5 rounded-full flex items-center justify-center" style="background:var(--primary)">
          <i data-lucide="check" class="w-2.5 h-2.5 text-white" stroke-width="3"></i>
        </span>
      </button>
      <button class="week-pill flex-shrink-0 relative px-3 py-1.5 rounded-full text-xs font-bold bg-white border text-gray-500" style="border-color:var(--border)">
        שבוע 5
        <span class="absolute -top-0.5 -left-0.5 w-3.5 h-3.5 rounded-full flex items-center justify-center" style="background:var(--primary)">
          <i data-lucide="check" class="w-2.5 h-2.5 text-white" stroke-width="3"></i>
        </span>
      </button>
      <button class="week-pill flex-shrink-0 relative px-3 py-1.5 rounded-full text-xs font-bold bg-white border text-gray-500" style="border-color:var(--border)">
        שבוע 6
        <span class="absolute -top-0.5 -left-0.5 w-3.5 h-3.5 rounded-full flex items-center justify-center" style="background:var(--primary)">
          <i data-lucide="check" class="w-2.5 h-2.5 text-white" stroke-width="3"></i>
        </span>
      </button>
      <button class="week-pill flex-shrink-0 relative px-3 py-1.5 rounded-full text-xs font-bold bg-white border text-gray-500" style="border-color:var(--border)">
        שבוע 7
        <span class="absolute -top-0.5 -left-0.5 w-3.5 h-3.5 rounded-full flex items-center justify-center" style="background:var(--primary)">
          <i data-lucide="check" class="w-2.5 h-2.5 text-white" stroke-width="3"></i>
        </span>
      </button>
      <!-- Week 8: active -->
      <button class="week-pill flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-extrabold text-white shadow-sm" style="background:var(--primary)">
        שבוע 8
      </button>
      <!-- Weeks 9-12: future -->
      <button class="week-pill flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-bold bg-white border text-gray-400" style="border-color:var(--border)">שבוע 9</button>
      <button class="week-pill flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-bold bg-white border text-gray-400" style="border-color:var(--border)">שבוע 10</button>
      <button class="week-pill flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-bold bg-white border text-gray-400" style="border-color:var(--border)">שבוע 11</button>
      <button class="week-pill flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-bold bg-white border text-gray-400" style="border-color:var(--border)">שבוע 12</button>
    </div>
  </div>

  <!-- Task List -->
  <section class="px-4 mt-2">
    <div class="bg-white rounded-2xl shadow-sm overflow-hidden" style="border:1px solid var(--border)">

      <!-- Task 1: Checked -->
      <div class="task-row flex items-center gap-2.5 px-3 py-3.5 border-b" style="border-color:var(--border)">
        <i data-lucide="grip-vertical" class="w-4 h-4 text-gray-300 flex-shrink-0 cursor-grab"></i>
        <div class="w-5 h-5 rounded-md flex items-center justify-center flex-shrink-0" style="background:var(--primary)">
          <i data-lucide="check" class="w-3.5 h-3.5 text-white" stroke-width="3"></i>
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-medium text-gray-400 line-through">הרצאה 8 — מצביעים למבנים</div>
        </div>
        <div class="w-6 h-6 rounded-lg flex items-center justify-center" style="background:var(--primary-soft)">
          <i data-lucide="video" class="w-3.5 h-3.5" style="color:var(--primary)"></i>
        </div>
      </div>

      <!-- Task 2: Checked -->
      <div class="task-row flex items-center gap-2.5 px-3 py-3.5 border-b" style="border-color:var(--border)">
        <i data-lucide="grip-vertical" class="w-4 h-4 text-gray-300 flex-shrink-0 cursor-grab"></i>
        <div class="w-5 h-5 rounded-md flex items-center justify-center flex-shrink-0" style="background:var(--primary)">
          <i data-lucide="check" class="w-3.5 h-3.5 text-white" stroke-width="3"></i>
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-medium text-gray-400 line-through">תרגול 8 — תרגילי מצביעים</div>
        </div>
        <div class="w-6 h-6 rounded-lg flex items-center justify-center" style="background:#ede9fe">
          <i data-lucide="pencil" class="w-3.5 h-3.5 text-purple-500"></i>
        </div>
      </div>

      <!-- Task 3: Unchecked -->
      <div class="task-row flex items-center gap-2.5 px-3 py-3.5">
        <i data-lucide="grip-vertical" class="w-4 h-4 text-gray-300 flex-shrink-0 cursor-grab"></i>
        <div class="w-5 h-5 rounded-md border-2 flex-shrink-0" style="border-color:#d1d5db"></div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-bold text-gray-800">שיעורי בית 8 — הגשה עד 5.6</div>
          <div class="flex items-center gap-1 mt-0.5">
            <span class="text-[10px] px-1.5 py-0.5 rounded-full font-bold" style="background:#fef3c7;color:#92400e">ממתין</span>
          </div>
        </div>
        <div class="flex items-center gap-1.5">
          <div class="w-6 h-6 rounded-lg bg-gray-50 flex items-center justify-center">
            <i data-lucide="paperclip" class="w-3.5 h-3.5 text-gray-400"></i>
          </div>
        </div>
      </div>

    </div>
  </section>

  <!-- Notes Section -->
  <section class="px-4 mt-4">
    <div class="rounded-2xl shadow-sm p-4" style="background:var(--surface);border:1px solid var(--hairline);border-right:4px solid var(--warn)">
      <div class="flex items-center gap-2 mb-2.5">
        <div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:var(--warn-soft)">
          <i data-lucide="sticky-note" class="w-4 h-4" style="color:var(--warn)"></i>
        </div>
        <span class="text-xs font-bold" style="color:var(--ink-2)">הערות</span>
      </div>
      <textarea
        class="w-full text-sm rounded-xl p-3 border-0 resize-none focus:outline-none"
        style="background:var(--warn-soft);color:var(--ink);"
        rows="3"
        placeholder="הערות לשבוע 8..."
      ></textarea>
    </div>
  </section>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto bg-white border-t border-gray-100 px-3 pt-2 pb-5 flex items-end justify-around z-40">
    <a href="home.html" class="flex flex-col items-center gap-0.5 flex-1 text-gray-400">
      <i data-lucide="home" class="w-6 h-6"></i>
      <span class="text-[10px] font-bold">בית</span>
    </a>
    <a href="calendar.html" class="flex flex-col items-center gap-0.5 flex-1 text-gray-400">
      <i data-lucide="calendar" class="w-6 h-6"></i>
      <span class="text-[10px] font-bold">יומן</span>
    </a>
    <a href="add-item.html" class="flex flex-col items-center -mt-7 flex-1">
      <div class="w-14 h-14 rounded-full nav-fab flex items-center justify-center" style="background:var(--primary)">
        <i data-lucide="plus" class="w-7 h-7 text-white"></i>
      </div>
    </a>
    <a href="studies.html" class="flex flex-col items-center gap-0.5 flex-1" style="color:var(--primary)">
      <i data-lucide="graduation-cap" class="w-6 h-6" style="fill:var(--primary-soft)"></i>
      <span class="text-[10px] font-extrabold">לימודים</span>
    </a>
    <a href="more.html" class="flex flex-col items-center gap-0.5 flex-1 text-gray-400">
      <i data-lucide="menu" class="w-6 h-6"></i>
      <span class="text-[10px] font-bold">עוד</span>
    </a>
  </nav>

</div>
<div class="preview-note">תצוגה מקדימה • לא פעיל</div>
<script>lucide.createIcons();</script>
</body>
</html>
