<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>הוסיפו פריט חדש — StudyTracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{
    --bg:#F5F5F7;--bg-deep:#ECECEF;--surface:#FFFFFF;--surface-2:#FAFAFB;
    --hairline:#E5E5EA;--hairline-strong:#D2D2D7;
    --ink:#1D1D1F;--ink-2:#4A4A4F;--ink-3:#8E8E93;--ink-4:#C7C7CC;
    --primary:#059669;--primary-2:#10B981;--primary-soft:#D1FAE5;--primary-tint:rgba(5,150,105,0.06);--primary-fg:#FFFFFF;
    --nutrition:#059669;--nutrition-2:#10B981;--nutrition-soft:#D1FAE5;--nutrition-tint:rgba(5,150,105,0.06);
    --fitness:#7C3AED;--fitness-2:#8B5CF6;--fitness-soft:#EDE9FE;--fitness-tint:rgba(124,58,237,0.06);
    --danger:#DC2626;--warn:#D97706;--info:#2563EB;--warn-soft:#FEF3C7;
    --text:var(--ink);--text-muted:var(--ink-3);--border:var(--hairline);
  }
  body{font-family:'Heebo','Rubik',sans-serif;background:var(--bg-deep);color:var(--ink);margin:0;}
  .phone{max-width:430px;margin:0 auto;background:var(--bg);min-height:100vh;position:relative;overflow:hidden;}
  @media(min-width:500px){.phone{margin:24px auto;border-radius:2.25rem;min-height:calc(100vh - 48px);box-shadow:0 25px 50px -12px rgba(0,0,0,.25);overflow:hidden;border:8px solid #111;}}
  .preview-note{position:fixed;bottom:8px;left:8px;font-size:10px;color:#9ca3af;z-index:50;}

  /* Backdrop */
  .backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.4);z-index:30;}

  /* Bottom sheet */
  .bottom-sheet{
    position:absolute;bottom:0;left:0;right:0;z-index:40;
    background:var(--surface);
    border-radius:1.5rem 1.5rem 0 0;
    box-shadow:0 -10px 40px rgba(0,0,0,0.15);
    animation:slideUp .4s cubic-bezier(.22,1,.36,1) forwards;
    max-height:92vh;
    overflow-y:auto;
    scrollbar-width:none;
  }
  .bottom-sheet::-webkit-scrollbar{display:none;}
  @keyframes slideUp{
    from{transform:translateY(100%);}
    to{transform:translateY(0);}
  }

  /* Drag handle */
  .drag-handle{width:40px;height:5px;border-radius:999px;background:#d1d5db;margin:10px auto 0;}

  /* Segment tabs */
  .seg-pill{display:flex;background:#f3f4f6;border-radius:12px;padding:4px;gap:2px;}
  .seg-btn{flex:1;text-align:center;font-size:13px;font-weight:600;padding:8px 0;border-radius:10px;cursor:pointer;transition:all .2s;color:var(--text-muted);border:none;background:transparent;}
  .seg-btn.active{background:var(--primary);color:var(--primary-fg);box-shadow:0 2px 8px rgba(5,150,105,0.25);}

  /* Form row */
  .form-row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--border);}
  .form-row:last-child{border-bottom:none;}
  .form-row .icon-wrap{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .form-row .row-label{flex:1;font-size:14px;font-weight:500;color:var(--text);}
  .badge{font-size:12px;font-weight:600;padding:4px 12px;border-radius:8px;}
  .badge-muted{background:#f3f4f6;color:var(--text-muted);}
  .badge-green{background:var(--primary-soft);color:var(--primary);}

  /* Priority dots */
  .priority-group{display:flex;align-items:center;gap:8px;}
  .priority-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;border:2px solid transparent;}
  .priority-dot.selected{border-color:var(--text);transform:scale(1.15);box-shadow:0 2px 8px rgba(0,0,0,0.15);}

  /* Category circles */
  .cat-btn{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
  .cat-circle{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;border:2px solid transparent;}
  .cat-circle:hover{transform:scale(1.08);}
  .cat-label{font-size:11px;font-weight:500;color:var(--text-muted);}

  /* CTA */
  .cta-btn{
    width:100%;padding:16px;border:none;border-radius:16px;
    background:var(--primary);color:var(--primary-fg);
    font-family:'Heebo',sans-serif;font-size:16px;font-weight:700;
    cursor:pointer;transition:all .2s;
    box-shadow:0 4px 14px rgba(5,150,105,0.35);
  }
  .cta-btn:hover{filter:brightness(1.08);transform:translateY(-1px);}
  .cta-btn:active{transform:scale(.98);}
</style>
</head>
<body>
<div class="phone">

  <!-- Backdrop -->
  <div class="backdrop"></div>

  <!-- Bottom Sheet -->
  <div class="bottom-sheet">

    <!-- Drag Handle -->
    <div class="drag-handle"></div>

    <div style="padding:20px 24px 32px;">

      <!-- Back link -->
      <a href="index.html" style="font-size:12px;color:#9ca3af;text-decoration:none;display:inline-block;margin-bottom:8px;">← חזרה לתצוגה</a>

      <!-- Title -->
      <h1 style="font-size:20px;font-weight:800;color:var(--text);margin:0 0 18px;">הוסיפו פריט חדש</h1>

      <!-- Segment Tabs -->
      <div class="seg-pill" style="margin-bottom:22px;">
        <button class="seg-btn">אירוע</button>
        <button class="seg-btn active">משימה</button>
        <button class="seg-btn">פתק</button>
      </div>

      <!-- Title Input -->
      <div style="margin-bottom:16px;">
        <input type="text" placeholder="כותרת המשימה"
          style="width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:14px;font-family:'Heebo',sans-serif;font-size:15px;font-weight:500;color:var(--text);background:#fafafa;outline:none;box-sizing:border-box;transition:border .2s;"
          onfocus="this.style.borderColor='var(--primary)';this.style.background='#fff'"
          onblur="this.style.borderColor='var(--border)';this.style.background='#fafafa'"
        />
      </div>

      <!-- Form Fields -->
      <div style="margin-bottom:20px;">

        <!-- Date picker -->
        <div class="form-row">
          <div class="icon-wrap" style="background:#EDE9FE;">
            <i data-lucide="calendar" class="w-[18px] h-[18px] text-purple-600"></i>
          </div>
          <div class="row-label">תאריך יעד</div>
          <div class="badge badge-muted">ללא</div>
          <i data-lucide="chevron-left" class="w-4 h-4" style="color:#d1d5db;flex-shrink:0;"></i>
        </div>

        <!-- Reminder -->
        <div class="form-row">
          <div class="icon-wrap" style="background:#FEF3C7;">
            <i data-lucide="bell" class="w-[18px] h-[18px] text-amber-500"></i>
          </div>
          <div class="row-label">תזכורת</div>
          <div class="badge badge-muted">ללא</div>
          <i data-lucide="chevron-left" class="w-4 h-4" style="color:#d1d5db;flex-shrink:0;"></i>
        </div>

        <!-- Course selector -->
        <div class="form-row">
          <div class="icon-wrap" style="background:#DBEAFE;">
            <i data-lucide="book-open" class="w-[18px] h-[18px] text-blue-600"></i>
          </div>
          <div class="row-label">קורס</div>
          <div class="badge badge-green">אינפי 2</div>
          <i data-lucide="chevron-left" class="w-4 h-4" style="color:#d1d5db;flex-shrink:0;"></i>
        </div>

        <!-- Priority -->
        <div class="form-row" style="border-bottom:none;">
          <div class="icon-wrap" style="background:#FEE2E2;">
            <i data-lucide="flag" class="w-[18px] h-[18px] text-red-500"></i>
          </div>
          <div class="row-label">עדיפות</div>
          <div class="priority-group">
            <div class="priority-dot" style="background:#ef4444;" title="גבוהה"></div>
            <div class="priority-dot" style="background:#f59e0b;" title="בינונית"></div>
            <div class="priority-dot selected" style="background:#10b981;" title="רגילה">
              <i data-lucide="check" class="w-3.5 h-3.5 text-white"></i>
            </div>
          </div>
          <span style="font-size:12px;font-weight:600;color:var(--primary);margin-inline-start:4px;">רגיל</span>
        </div>
      </div>

      <!-- Category Icons -->
      <div style="margin-bottom:24px;">
        <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;">קטגוריה</div>
        <div style="display:flex;justify-content:space-around;">
          <div class="cat-btn">
            <div class="cat-circle" style="background:#DBEAFE;border-color:#3b82f6;">
              <i data-lucide="graduation-cap" class="w-5 h-5 text-blue-600"></i>
            </div>
            <span class="cat-label" style="color:#3b82f6;font-weight:600;">לימודים</span>
          </div>
          <div class="cat-btn">
            <div class="cat-circle" style="background:#F3E8FF;">
              <i data-lucide="user" class="w-5 h-5 text-purple-500"></i>
            </div>
            <span class="cat-label">אישי</span>
          </div>
          <div class="cat-btn">
            <div class="cat-circle" style="background:#D1FAE5;">
              <i data-lucide="heart-pulse" class="w-5 h-5 text-emerald-600"></i>
            </div>
            <span class="cat-label">בריאות</span>
          </div>
          <div class="cat-btn">
            <div class="cat-circle" style="background:#FEF3C7;">
              <i data-lucide="briefcase" class="w-5 h-5 text-amber-600"></i>
            </div>
            <span class="cat-label">עבודה</span>
          </div>
        </div>
      </div>

      <!-- CTA Button -->
      <button class="cta-btn">הוסף משימה</button>

    </div>
  </div>

</div>
<div class="preview-note">תצוגה מקדימה • לא פעיל</div>
<script>lucide.createIcons();</script>
</body>
</html>
